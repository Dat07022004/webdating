name: Web Dating CI - Test & Coverage

on:
  push:
    branches: '**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Run Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Chạy Test cho Backend
      - name: Backend - Install & Test
        run: |
          cd backend
          npm install
          npm run test:coverage

      # Chạy Test cho Frontend
      - name: Frontend - Install & Test
        run: |
          cd frontend
          npm install
          npm run test:coverage

      # Gom báo cáo Coverage về một chỗ để xem trên GitHub
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report
          path: |
            backend/coverage/
            frontend/coverage/
          retention-days: 7
